server {
    listen 80;
    server_name internal.docs.local;

    root /srv/alfafaa-knowledge-hub/internal-site/current/content;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name engineering.docs.local;

    root /srv/alfafaa-knowledge-hub/engineering-site/current/content;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

