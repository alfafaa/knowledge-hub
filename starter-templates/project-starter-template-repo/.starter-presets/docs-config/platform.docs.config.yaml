repo_type: platform
repo_name: __AUTO_REPO_NAME__
project_slug: __AUTO_PROJECT_SLUG__
docs_version: 1

structure:
  mandatory:
    - 00-overview
    - 01-getting-started
    - 02-architecture
    - 03-decisions
    - 04-development
    - 05-operations
    - 06-reference
    - 07-release
    - 90-archive
  recommended:
    - 08-quality
    - 09-knowledge
  optional:
    - 10-integrations
    - 11-guides
    - 98-meta

defaults:
  sync_mode: indexed-only
  visibility: internal
  audience: engineering
  publish: false
  publish_targets:
    - engineering-site

sync:
  include:
    - "docs/_index.md"
    - "docs/00-overview/**"
    - "docs/02-architecture/**"
    - "docs/03-decisions/**"
    - "docs/04-development/**"
    - "docs/05-operations/**"
    - "docs/06-reference/**"
    - "docs/07-release/**"
    - "docs/09-knowledge/**"
    - "docs/11-guides/**"
  exclude:
    - "docs/**/drafts/**"
    - "docs/**/scratch/**"
    - "docs/98-meta/workspace-notes/**"
    - "docs/90-archive/**"
  overrides:
    "docs/00-overview/**":
      sync_mode: mirrored
      visibility: internal
      audience: engineering
      publish: true
      publish_targets:
        - engineering-site
    "docs/02-architecture/**":
      sync_mode: mirrored
      visibility: internal
      audience: engineering
      publish: true
      publish_targets:
        - engineering-site
    "docs/03-decisions/**":
      sync_mode: mirrored
      visibility: internal
      audience: engineering
      publish: true
      publish_targets:
        - engineering-site
    "docs/05-operations/runbooks/**":
      sync_mode: mirrored
      visibility: internal
      audience: engineering
      publish: true
      publish_targets:
        - engineering-site
    "docs/11-guides/internal/**":
      sync_mode: mirrored
      visibility: internal
      audience: internal
      publish: true
      publish_targets:
        - internal-site
    "docs/11-guides/engineering/**":
      sync_mode: mirrored
      visibility: internal
      audience: engineering
      publish: true
      publish_targets:
        - engineering-site
  destinations:
    "docs/00-overview/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/00-overview/"
    "docs/02-architecture/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/02-architecture/"
    "docs/03-decisions/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/03-decisions/"
    "docs/04-development/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/04-development/"
    "docs/05-operations/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/05-operations/"
    "docs/06-reference/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/06-reference/"
    "docs/07-release/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/07-release/"
    "docs/11-guides/internal/**":
      hub_path: "hub/06-support/internal-kb/repo-slug/"
    "docs/11-guides/engineering/**":
      hub_path: "hub/04-engineering/platform/{repo_name}/11-guides/engineering/"

approval:
  required_for:
    public: true
    restricted: true
    policy: true
    security_sensitive: true

ownership:
  default_owner: team-name
  require_owner: true
