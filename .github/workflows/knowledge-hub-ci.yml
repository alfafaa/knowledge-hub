name: Knowledge Hub CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  knowledge-hub-pipeline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        docs_root:
          - examples/sample-project-repo/docs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency
        run: python -m pip install pyyaml

      - name: Run end-to-end pipeline
        env:
          PIPELINE_BRANCH: ${{ github.head_ref || github.ref_name }}
          PIPELINE_EVENT: ${{ github.event_name }}
        run: >
          python3 scripts/run_pipeline.py
          --docs-root "${{ matrix.docs_root }}"
          --branch "$PIPELINE_BRANCH"
          --event "$PIPELINE_EVENT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-hub-build-${{ matrix.docs_root }}
          path: |
            build/
            hub/98-meta/publishing/
            quartz/workspace-summary.json
            quartz/workspaces/
            build/deploy/
          if-no-files-found: error
