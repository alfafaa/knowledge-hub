name: Knowledge Hub Source Sync

on:
  repository_dispatch:
    types:
      - source-docs-sync-requested
  workflow_dispatch:
    inputs:
      source_repository:
        description: "owner/repo to ingest"
        required: true
        type: string
      source_ref:
        description: "ref to ingest"
        required: true
        type: string
      docs_root:
        description: "docs root relative to the source repo"
        required: true
        default: "docs"
        type: string
      config_path:
        description: "optional config path relative to the source repo"
        required: false
        default: "docs/docs.config.yaml"
        type: string

jobs:
  sync-source-repo-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve event payload
        id: payload
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "source_repository=${{ github.event.client_payload.source_repository }}" >> "$GITHUB_OUTPUT"
            echo "source_ref=${{ github.event.client_payload.source_ref }}" >> "$GITHUB_OUTPUT"
            echo "docs_root=${{ github.event.client_payload.docs_root }}" >> "$GITHUB_OUTPUT"
            echo "config_path=${{ github.event.client_payload.config_path }}" >> "$GITHUB_OUTPUT"
            echo "requested_by=${{ github.event.client_payload.requested_by }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_repository=${{ inputs.source_repository }}" >> "$GITHUB_OUTPUT"
            echo "source_ref=${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
            echo "docs_root=${{ inputs.docs_root }}" >> "$GITHUB_OUTPUT"
            echo "config_path=${{ inputs.config_path }}" >> "$GITHUB_OUTPUT"
            echo "requested_by=${{ github.actor }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout knowledge hub repository
        uses: actions/checkout@v4

      - name: Build source checkout path
        id: paths
        shell: bash
        run: |
          repo_path="sources/${{ steps.payload.outputs.source_repository }}"
          echo "repo_path=$repo_path" >> "$GITHUB_OUTPUT"

      - name: Sanitize artifact suffix
        id: naming
        shell: bash
        run: |
          suffix="${{ steps.payload.outputs.source_repository }}"
          suffix="${suffix//\//-}"
          echo "artifact_suffix=$suffix" >> "$GITHUB_OUTPUT"

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.payload.outputs.source_repository }}
          ref: ${{ steps.payload.outputs.source_ref }}
          path: ${{ steps.paths.outputs.repo_path }}
          token: ${{ secrets.SOURCE_REPO_READ_TOKEN != '' && secrets.SOURCE_REPO_READ_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency
        run: python -m pip install pyyaml

      - name: Run central docs pipeline for source repo
        env:
          SOURCE_REPO_PATH: ${{ steps.paths.outputs.repo_path }}
          DOCS_ROOT: ${{ steps.payload.outputs.docs_root }}
          CONFIG_PATH: ${{ steps.payload.outputs.config_path }}
          PIPELINE_BRANCH: ${{ steps.payload.outputs.source_ref }}
        shell: bash
        run: |
          set -euo pipefail
          docs_path="$SOURCE_REPO_PATH/$DOCS_ROOT"
          config_args=()
          if [ -n "$CONFIG_PATH" ]; then
            config_args+=(--config "$SOURCE_REPO_PATH/$CONFIG_PATH")
          fi
          python3 scripts/run_pipeline.py \
            --docs-root "$docs_path" \
            "${config_args[@]}" \
            --branch "$PIPELINE_BRANCH" \
            --event "${{ github.event_name }}"

      - name: Configure SSH agent for VPS deployment
        if: ${{ secrets.KNOWLEDGE_HUB_DEPLOY_SSH_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KNOWLEDGE_HUB_DEPLOY_SSH_KEY }}

      - name: Trust staging host
        if: ${{ secrets.KNOWLEDGE_HUB_DEPLOY_SSH_KEY != '' }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 89.167.69.232 >> ~/.ssh/known_hosts

      - name: Deploy rendered outputs to VPS
        if: ${{ secrets.KNOWLEDGE_HUB_DEPLOY_SSH_KEY != '' }}
        run: python3 scripts/deploy_via_ssh.py

      - name: Upload source sync artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-hub-source-sync-${{ steps.naming.outputs.artifact_suffix }}
          path: |
            build/
            hub/98-meta/publishing/
            quartz/workspace-summary.json
            quartz/workspaces/
            build/deploy/
          if-no-files-found: error
